  platform: "Windows 11 laptop, Lenovo LOQ"
  cpu_cores: "14"
  ram_gb: "24"
  python_version: "Python 3.10.0"
  os: "Windows 11 25H2"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 2
  # The TF-IDF+SVD semantic index (artifacts/) is built on first run and
  # cached to disk; rebuilding it from scratch takes ~1.5-2 minutes on a
  # single CPU core. The ranking step itself (rank.py) completes in well
  # under 5 minutes even including this build on a cold cache, and in
  # under a minute once the cache is warm.

