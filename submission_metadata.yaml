ai_usage_summary: |
  Used Claude (Anthropic) as a development assistant: analyzing the
  hackathon's data bundle and JD to design the scoring architecture,
  writing and iterating on the Python implementation (config.py,
  features.py, semantic.py, behavioral.py, consistency.py, scoring.py,
  pipeline.py), writing tests, and validating output against the official
  validate_submission.py script and the real candidates.jsonl dataset
  across multiple iterations.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker combining a TF-IDF + Truncated SVD semantic-similarity
  layer (genuine dense-vector matching against the JD's affirmative
  requirements only) with seven rule-based fit components derived
  directly from the JD: title tier, must-have skill groups (with a
  trust score that discounts skills claimed with little
  proficiency/duration evidence -- the direct countermeasure to keyword
  stuffing), experience-band fit, location, notice period, and education.
  JD-explicit disqualifiers (consulting-only career, recent LLM-wrapper
  pivot without prior depth, CV/speech-only without NLP/IR overlap,
  closed-source-only with no external validation, title-chasing job-hops,
  pure-research-only) apply as soft multiplicative penalties, not hard
  cutoffs. An internal-consistency checker (consistency.py) detects
  honeypot profiles by their stated impossibility (years-of-experience
  vs. career-history mismatch, "expert" skills with near-zero duration,
  overlapping employment dates) -- not by "looking suspicious" -- and
  crushes their score near zero. Finally, the 23 redrob_signals are
  combined into a bounded 0.55x-1.05x availability multiplier so a
  qualified-but-dormant candidate is down-weighted without ever letting
  pure activity override genuine skill mismatch. Runs in well under 5
  minutes on a single CPU core for the full 100,000-candidate pool.

