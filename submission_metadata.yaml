# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid Ranker that combines TF-IDF & Truncated SVD
  similarity matching (dense vector matching based on JD's positive
  requirements only) with 7 fit components based on the JD: title level,
  must-have skills (with a trust factor, which penalizes claims of skills
  with poor duration/proficiency evidence -- the explicit penalty to
  keyword stuffing), experience-band fit, location, notice period, and
  education. JD-specific disqualification factors (only consulting
  experience, LLM wrapper shift without prior experience, CV/speech only
  without any natural language processing/Information Retrieval
  background, closed source software only without any independent
  verification, job hopping just to match titles, research only)
  implemented as soft multiplicative penalties rather than hard cutoffs.
  Internal consistency check (consistency.py) catches honeypots by the
  stated impossibility (year of experience vs. Career history mismatch,
  claiming "expert" skills with practically zero duration, conflicting
  employment date) -- not by mere suspicion, and smashes the score close
  to zero. Lastly, 23 redrob_signals are combined into an availability
  multipler within 0.55x - 1.05x range -- to properly down-weight
  otherwise dormant candidate without ever allowing activity to override
  a skill mismatch. Runs in well under 5 minutes on a single CPU core
  for 100,000 candidates pool.

