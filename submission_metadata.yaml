# Measured runtime on a single CPU core / ~4GB RAM dev sandbox: ~135s cold
# (no cached semantic index), ~30-45s warm (cached) -- comfortably inside
# the spec's 5-minute / 16GB / CPU-only / no-network budget.

# ============================================================================
# Compute environment
# ============================================================================
